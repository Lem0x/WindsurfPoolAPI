services:
  windsurfapi:
    build: .
    image: windsurfapi:latest
    container_name: windsurfapi
    restart: unless-stopped
    expose:
      - "3003"
    environment:
      - PORT=${PORT:-3003}
      - LS_PORT=${LS_PORT:-42100}
      - LS_BINARY_PATH=${LS_BINARY_PATH:-/opt/windsurf/language_server_linux_x64}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-4o-mini}
      - MAX_TOKENS=${MAX_TOKENS:-8192}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      
      - DASHBOARD_PASSWORD
      - API_KEY
    volumes:
      - /opt/windsurf:/opt/windsurf:ro
      - windsurf_data:/app/data
      - windsurf_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  windsurf_data:
  windsurf_logs:
